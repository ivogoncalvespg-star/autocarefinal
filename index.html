<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AutoCare">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3039/3039430.png">
    <title>AutoCare Pro - Cloud Gold V2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tab-active { background: #2563eb !important; color: white !important; box-shadow: 0 8px 15px rgba(37, 99, 235, 0.2); }
        
        input, select, textarea { 
            border: 1px solid #e2e8f0 !important; 
            background: #ffffff !important;
            padding: 14px 16px !important;
            border-radius: 16px !important;
            width: 100% !important;
            font-size: 16px !important;
            outline: none !important;
        }
        .item-check { display: none; }
        .item-label { 
            display: flex; align-items: center; justify-content: center;
            padding: 12px 4px; border: 1px solid #e2e8f0; border-radius: 14px;
            font-size: 11px; font-weight: 700; color: #64748b;
            background: white; cursor: pointer; transition: 0.2s;
            text-align: center; height: 100%;
        }
        .item-check:checked + .item-label { background: #eff6ff; border-color: #2563eb; color: #2563eb; box-shadow: inset 0 0 0 1px #2563eb; }
        .pos-btn { border: 2px solid #e2e8f0; border-radius: 14px; padding: 12px 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; background: white; transition: 0.2s; width: 100%; }
        .pos-btn.selected { background: #2563eb; color: white; border-color: #2563eb; transform: scale(1.02); }
        .modal-overlay { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); }

        /* Animação de rotação para o sync */
        .spin-sync { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen overflow-hidden text-slate-900">

    <div class="flex h-full">
        <!-- SIDEBAR -->
        <aside class="w-20 md:w-64 bg-slate-900 text-white flex flex-col items-center md:items-start p-4 md:p-6 border-r border-slate-800">
            <div class="flex items-center gap-3 mb-10 mt-4">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg"><i data-lucide="wrench" size="20"></i></div>
                <h1 class="hidden md:block text-xl font-black tracking-tighter italic">AutoCare</h1>
            </div>
            
            <nav class="space-y-4 w-full">
                <button onclick="setView('garage')" id="btn-garage" class="w-full p-4 rounded-2xl flex items-center justify-center md:justify-start gap-4 transition-all text-slate-400 font-bold">
                    <i data-lucide="car"></i> <span class="hidden md:block text-sm">Garagem</span>
                </button>
                <button onclick="setView('stats')" id="btn-stats" class="w-full p-4 rounded-2xl flex items-center justify-center md:justify-start gap-4 transition-all text-slate-400 font-bold">
                    <i data-lucide="bar-chart-3"></i> <span class="hidden md:block text-sm">Relatórios</span>
                </button>
                
                <!-- INDICADOR CLOUD -->
                <div class="pt-10 mt-10 border-t border-slate-800 w-full space-y-3">
                    <div id="cloud-status-badge" class="flex items-center gap-3 px-4 py-2 rounded-2xl bg-slate-800/50 text-[10px] font-black uppercase tracking-widest text-slate-500">
                        <div id="status-icon"><i data-lucide="cloud-off" size="14"></i></div>
                        <span id="status-text" class="hidden md:block text-slate-400">Desligado</span>
                    </div>

                    <button id="btn-auth" onclick="authDropbox()" class="w-full p-4 rounded-2xl flex items-center justify-center md:justify-start gap-4 transition-all text-blue-400 font-bold hover:bg-blue-500/10">
                        <i data-lucide="link"></i> <span class="hidden md:block text-sm">Ligar Dropbox</span>
                    </button>
                    <button id="btn-sync-manual" onclick="syncToCloud(false)" style="display:none;" class="w-full p-4 rounded-2xl flex items-center justify-center md:justify-start gap-4 transition-all text-emerald-500 font-bold hover:bg-emerald-500/10">
                        <i data-lucide="refresh-cw"></i> <span class="hidden md:block text-sm">Backup Agora</span>
                    </button>
                </div>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col overflow-hidden bg-slate-50">
            <header class="bg-white p-6 border-b flex justify-between items-center shadow-sm z-10">
                <h2 id="view-title" class="text-2xl font-black text-slate-800 uppercase tracking-tighter italic">Garagem</h2>
                <div id="header-actions"></div>
            </header>
            <div id="content" class="p-4 md:p-8 overflow-y-auto h-full custom-scroll pb-40"></div>
        </main>
    </div>

    <!-- MODAL VIATURA -->
    <div id="car-modal" style="display:none;" class="fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[40px] w-full max-w-lg shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 id="car-modal-title" class="text-2xl font-black text-slate-800 text-center uppercase tracking-tighter mb-8 italic text-blue-600">Configurar Viatura</h3>
            <input type="hidden" id="edit-car-id">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-1"><label class="text-[10px] font-black text-slate-400 uppercase ml-1 block">Marca</label><input type="text" id="m-marca" placeholder="Audi"></div>
                <div class="col-span-1"><label class="text-[10px] font-black text-slate-400 uppercase ml-1 block">Modelo</label><input type="text" id="m-modelo" placeholder="A3"></div>
                <div class="col-span-1"><label class="text-[10px] font-black text-slate-400 uppercase ml-1 block">Matrícula</label><input type="text" id="m-mat" placeholder="00-AA-00" class="font-bold text-blue-600 uppercase"></div>
                <div class="col-span-1"><label class="text-[10px] font-black text-slate-400 uppercase ml-1 block">KMs Atuais</label><input type="number" id="m-km" placeholder="0"></div>
                <div class="col-span-1"><label class="text-[10px] font-black text-slate-400 uppercase ml-1 block">Ano</label><input type="number" id="m-ano" placeholder="2020"></div>
                <div class="col-span-1"><label class="text-[10px] font-black text-slate-400 uppercase ml-1 block">Combustível</label><select id="m-combustivel"><option>Diesel</option><option>Gasolina</option><option>Elétrico</option><option>Híbrido</option></select></div>
                <div class="col-span-2"><label class="text-[10px] font-black text-slate-400 uppercase ml-1 block">VIN (Chassis)</label><input type="text" id="m-vin" class="uppercase font-mono"></div>
            </div>
            <div class="mt-10 flex flex-col gap-3">
                <button onclick="saveCar()" class="w-full bg-blue-600 text-white p-5 rounded-3xl font-black uppercase text-xs shadow-xl shadow-blue-200 tracking-widest">Guardar Viatura</button>
                <button onclick="closeModal('car-modal')" class="w-full text-slate-400 font-bold py-2 uppercase text-[10px] text-center">Sair</button>
            </div>
        </div>
    </div>

    <!-- MODAL PNEUS -->
    <div id="tire-modal" style="display:none;" class="fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[40px] w-full max-w-md shadow-2xl overflow-y-auto max-h-[95vh]">
            <h3 class="text-2xl font-black text-slate-800 text-center uppercase tracking-tighter mb-4 italic text-blue-600">Instalar Pneus</h3>
            <div class="grid grid-cols-2 gap-2 mb-6">
                <button onclick="toggleTirePos('FL')" id="pos-FL" class="pos-btn">Frente Esq.</button>
                <button onclick="toggleTirePos('FR')" id="pos-FR" class="pos-btn">Frente Dir.</button>
                <button onclick="toggleTirePos('RL')" id="pos-RL" class="pos-btn">Trás Esq.</button>
                <button onclick="toggleTirePos('RR')" id="pos-RR" class="pos-btn">Trás Dir.</button>
            </div>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase ml-1 mb-1 block">Marca</label><input type="text" id="t-marca" placeholder="Michelin"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase ml-1 mb-1 block">Medida</label><input type="text" id="t-medida" placeholder="225/45 R17"></div>
                </div>
                <div><label class="text-[10px] font-black text-blue-600 uppercase ml-1 mb-1 block italic font-bold">Custo Total (€)</label><input type="number" id="t-custo" placeholder="0.00" class="font-bold text-blue-600 bg-blue-50"></div>
                <div class="py-2 text-center">
                    <label class="flex items-center justify-center gap-3 w-full p-4 border-2 border-dashed border-blue-200 rounded-3xl cursor-pointer hover:bg-blue-50 transition-all">
                        <i data-lucide="camera" class="text-blue-500"></i>
                        <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Fotografar Fatura</span>
                        <input type="file" id="t-file-input" accept="image/*" class="hidden" onchange="processFile(this, 't-preview')">
                    </label>
                    <div id="t-preview" style="display:none;" class="text-[10px] text-emerald-600 font-black mt-2 italic">✓ IMAGEM CARREGADA</div>
                </div>
                <button onclick="saveTireBatch()" class="w-full bg-slate-900 text-white p-5 rounded-[24px] font-black uppercase text-xs shadow-xl tracking-widest mt-2 active:scale-95 transition-all">Registar Pneus</button>
                <button onclick="closeModal('tire-modal')" class="w-full text-slate-400 font-bold py-2 uppercase text-[10px] text-center">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL MANUTENÇÃO -->
    <div id="maint-modal" style="display:none;" class="fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[40px] w-full max-w-lg shadow-2xl overflow-y-auto max-h-[95vh]">
            <h3 class="text-2xl font-black mb-6 text-slate-800 text-center uppercase tracking-tighter italic text-blue-600">Registo Mecânico</h3>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase ml-1">Data</label><input type="date" id="mt-data"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase ml-1">KMs na Intervenção</label><input type="number" id="mt-km"></div>
                </div>
                <select id="mt-tipo" onchange="toggleMaintItems()" class="font-bold">
                    <option value="Revisão Periódica">Revisão Periódica</option>
                    <option value="Reparação Corretiva">Reparação Corretiva</option>
                    <option value="Outro">Outro</option>
                </select>
                <div id="revisao-items" class="bg-slate-50 p-5 rounded-[28px] border border-slate-200">
                    <div class="check-grid">
                        <input type="checkbox" id="it-oleo" class="item-check"><label for="it-oleo" class="item-label">Óleo Motor</label>
                        <input type="checkbox" id="it-f-oleo" class="item-check"><label for="it-f-oleo" class="item-label">Filtro Óleo</label>
                        <input type="checkbox" id="it-f-ar" class="item-check"><label for="it-f-ar" class="item-label">Filtro Ar</label>
                        <input type="checkbox" id="it-f-hab" class="item-check"><label for="it-f-hab" class="item-label">Filtro Habitáculo</label>
                        <input type="checkbox" id="it-f-comb" class="item-check"><label for="it-f-comb" class="item-label">Filtro Combustível</label>
                        <input type="checkbox" id="it-p-trav" class="item-check"><label for="it-p-trav" class="item-label">Pastilhas Travão</label>
                        <input type="checkbox" id="it-d-trav" class="item-check"><label for="it-d-trav" class="item-label">Discos Travão</label>
                        <input type="checkbox" id="it-o-trav" class="item-check"><label for="it-o-trav" class="item-label">Óleo Travão</label>
                        <input type="checkbox" id="it-o-caixa" class="item-check"><label for="it-o-caixa" class="item-label">Óleo Caixa Veloc.</label>
                    </div>
                </div>
                <input type="number" id="mt-custo" placeholder="Custo Total (€)" class="font-black text-lg">
                <textarea id="mt-notas" placeholder="Observações adicionais..." class="h-24 text-sm"></textarea>
                <div class="py-2 text-center">
                    <label class="flex items-center justify-center gap-3 w-full p-4 border-2 border-dashed border-blue-200 rounded-3xl cursor-pointer hover:bg-blue-50 transition-all">
                        <i data-lucide="camera" class="text-blue-500"></i>
                        <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Fotografar Fatura</span>
                        <input type="file" id="mt-file-input" accept="image/*" class="hidden" onchange="processFile(this, 'mt-preview')">
                    </label>
                    <div id="mt-preview" style="display:none;" class="text-[10px] text-emerald-600 font-black mt-2 italic">✓ DOCUMENTO CARREGADO</div>
                </div>
                <button onclick="addMaintenance()" class="w-full bg-blue-600 text-white p-5 rounded-[24px] font-black uppercase text-xs shadow-xl tracking-widest mt-2">Guardar Registo</button>
                <button onclick="closeModal('maint-modal')" class="w-full text-slate-400 font-bold py-2 uppercase text-[10px] text-center">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÕES CLOUD ---
        const APP_KEY = 'brxfqsxobfsuon9';
        const FILE_PATH = '/autocare_data.json';
        let db = JSON.parse(localStorage.getItem('autocare_v25_final')) || [];
        let dropboxToken = localStorage.getItem('db_token');

        // --- ATUALIZADOR VISUAL DE ESTADO CLOUD ---
        function updateCloudUI(status) {
            const badge = document.getElementById('cloud-status-badge');
            const iconWrap = document.getElementById('status-icon');
            const text = document.getElementById('status-text');
            
            badge.classList.remove('bg-slate-800/50', 'bg-blue-500/10', 'bg-emerald-500/10', 'bg-red-500/10');
            text.classList.remove('text-slate-400', 'text-blue-400', 'text-emerald-400', 'text-red-400');

            if (status === 'offline') {
                badge.classList.add('bg-slate-800/50');
                text.classList.add('text-slate-400');
                text.innerText = "Desligado";
                iconWrap.innerHTML = '<i data-lucide="cloud-off" size="14"></i>';
            } else if (status === 'syncing') {
                badge.classList.add('bg-blue-500/10');
                text.classList.add('text-blue-400');
                text.innerText = "Sincronizando...";
                iconWrap.innerHTML = '<i data-lucide="refresh-cw" size="14" class="spin-sync"></i>';
            } else if (status === 'synced') {
                badge.classList.add('bg-emerald-500/10');
                text.classList.add('text-emerald-400');
                text.innerText = "Sincronizado";
                iconWrap.innerHTML = '<i data-lucide="cloud-check" size="14"></i>';
            } else if (status === 'error') {
                badge.classList.add('bg-red-500/10');
                text.classList.add('text-red-400');
                text.innerText = "Erro Cloud";
                iconWrap.innerHTML = '<i data-lucide="alert-circle" size="14"></i>';
            }
            lucide.createIcons();
        }

        // --- LÓGICA DROPBOX ---
        function authDropbox() {
            const redirectUri = window.location.href.split('#')[0];
            const authUrl = `https://www.dropbox.com/oauth2/authorize?client_id=${APP_KEY}&response_type=token&redirect_uri=${encodeURIComponent(redirectUri)}`;
            window.location.href = authUrl;
        }

        function checkAuth() {
            if (window.location.hash.includes('access_token')) {
                const params = new URLSearchParams(window.location.hash.substring(1));
                dropboxToken = params.get('access_token');
                localStorage.setItem('db_token', dropboxToken);
                window.location.hash = "";
            }
            if (dropboxToken) {
                document.getElementById('btn-auth').style.display = 'none';
                document.getElementById('btn-sync-manual').style.display = 'flex';
                updateCloudUI('synced');
                loadFromCloud();
            } else {
                updateCloudUI('offline');
            }
        }

        async function syncToCloud(silent = true) {
            if (!dropboxToken) return;
            updateCloudUI('syncing');

            try {
                const response = await fetch('https://content.dropboxapi.com/2/files/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${dropboxToken}`,
                        'Dropbox-API-Arg': JSON.stringify({ path: FILE_PATH, mode: 'overwrite' }),
                        'Content-Type': 'application/octet-stream'
                    },
                    body: JSON.stringify(db)
                });
                if (response.ok) {
                    updateCloudUI('synced');
                    if (!silent) alert("✅ Backup Manual concluído!");
                } else {
                    throw new Error();
                }
            } catch (e) {
                updateCloudUI('error');
                if (!silent) alert("Falha na sincronização. Re-ligue o Dropbox.");
            }
        }

        async function loadFromCloud() {
            if (!dropboxToken) return;
            try {
                const response = await fetch('https://content.dropboxapi.com/2/files/download', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${dropboxToken}`,
                        'Dropbox-API-Arg': JSON.stringify({ path: FILE_PATH })
                    }
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0 && confirm("Dados encontrados na Cloud. Restaurar Garage?")) {
                        db = data;
                        localStorage.setItem('autocare_v25_final', JSON.stringify(db));
                        render();
                    }
                }
            } catch (e) { console.log("Primeiro uso."); }
        }

        // --- LÓGICA DA APP ---
        let currentView = 'garage', selectedCarId = null, activeTab = 'history', selectedTirePositions = [], currentFileData = null;

        function saveDB() { 
            localStorage.setItem('autocare_v25_final', JSON.stringify(db)); 
            render();
            syncToCloud(true); // Sincronização Automática Silenciosa ao guardar qualquer coisa
        }

        function setView(view, carId = null) { currentView = view; if(carId) selectedCarId = carId; render(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; currentFileData = null; }

        function processFile(input, previewId) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    currentFileData = canvas.toDataURL('image/jpeg', 0.6); 
                    document.getElementById(previewId).style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function viewFile(data) { 
            const nw = window.open(); 
            nw.document.write(`<html><body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;"><img src="${data}" style="max-width:100%;max-height:100%;"></body></html>`); 
        }

        function openCarModal(id = null) {
            const fields = ['m-marca','m-modelo','m-mat','m-km','m-ano','m-vin','edit-car-id'];
            fields.forEach(f => document.getElementById(f).value = '');
            if(id) {
                const c = db.find(x => x.id === id);
                document.getElementById('edit-car-id').value = c.id;
                document.getElementById('m-marca').value = c.marca;
                document.getElementById('m-modelo').value = c.modelo;
                document.getElementById('m-mat').value = c.mat;
                document.getElementById('m-km').value = c.km;
                document.getElementById('m-ano').value = c.ano;
                document.getElementById('m-vin').value = c.vin || '';
                document.getElementById('m-combustivel').value = c.combustivel;
            }
            document.getElementById('car-modal').style.display = 'flex';
        }

        function saveCar() {
            const editId = document.getElementById('edit-car-id').value;
            const data = { 
                marca: document.getElementById('m-marca').value, modelo: document.getElementById('m-modelo').value,
                mat: document.getElementById('m-mat').value, km: parseInt(document.getElementById('m-km').value || 0), 
                ano: document.getElementById('m-ano').value, vin: document.getElementById('m-vin').value,
                combustivel: document.getElementById('m-combustivel').value
            };
            if(!data.marca || !data.mat) return alert("Preencha Marca e Matrícula!");
            if(editId) { const idx = db.findIndex(c => c.id == editId); db[idx] = { ...db[idx], ...data }; }
            else { db.push({ ...data, id: Date.now(), maintenances: [], tires: { FL:null, FR:null, RL:null, RR:null } }); }
            saveDB(); closeModal('car-modal');
        }

        function toggleTirePos(pos) { 
            document.getElementById('pos-' + pos).classList.toggle('selected');
            if(selectedTirePositions.includes(pos)) selectedTirePositions = selectedTirePositions.filter(p => p !== pos);
            else selectedTirePositions.push(pos);
        }

        function openTireModalBatch() {
            selectedTirePositions = []; currentFileData = null;
            document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('tire-modal').style.display = 'flex';
        }

        function saveTireBatch() {
            if (!selectedTirePositions.length) return alert('Selecione as rodas!');
            const car = db.find(c => c.id === selectedCarId);
            const t = { marca: document.getElementById('t-marca').value, medida: document.getElementById('t-medida').value, custo: parseFloat(document.getElementById('t-custo').value || 0), data: new Date().toLocaleDateString(), km: car.km };
            selectedTirePositions.forEach(p => car.tires[p] = {...t});
            car.maintenances.push({ id: Date.now(), data: t.data, km: t.km, tipo: 'Pneus', custo: t.custo, notes: `Novos pneus: ${selectedTirePositions.join(', ')}`, file: currentFileData });
            saveDB(); closeModal('tire-modal');
        }

        function toggleMaintItems() { document.getElementById('revisao-items').style.display = (document.getElementById('mt-tipo').value === 'Revisão Periódica') ? 'block' : 'none'; }
        function openMaintModal() {
            const car = db.find(c => c.id === selectedCarId);
            document.getElementById('mt-km').value = car.km;
            document.getElementById('mt-data').value = new Date().toISOString().split('T')[0];
            document.getElementById('maint-modal').style.display = 'flex';
            toggleMaintItems();
        }

        function addMaintenance() {
            const car = db.find(c => c.id === selectedCarId);
            const tipo = document.getElementById('mt-tipo').value;
            let notes = document.getElementById('mt-notas').value;
            car.maintenances.push({ 
                id: Date.now(), data: document.getElementById('mt-data').value, 
                km: parseInt(document.getElementById('mt-km').value || 0), 
                tipo, custo: parseFloat(document.getElementById('mt-custo').value || 0), 
                notes, file: currentFileData 
            });
            car.km = Math.max(car.km, parseInt(document.getElementById('mt-km').value || 0));
            saveDB(); closeModal('maint-modal');
        }

        function delCar(id) { if(confirm('Apagar permanentemente?')) { db = db.filter(c => c.id !== id); saveDB(); } }

        function render() {
            const content = document.getElementById('content'), title = document.getElementById('view-title'), actions = document.getElementById('header-actions');
            ['garage', 'stats'].forEach(v => document.getElementById('btn-'+v)?.classList.toggle('tab-active', currentView === v));

            if (currentView === 'garage') {
                title.innerText = "Garagem";
                actions.innerHTML = `<button onclick="openCarModal()" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-black uppercase text-[10px] tracking-widest">+ Viatura</button>`;
                content.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">` + db.map(c => `
                    <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
                        <div class="flex justify-between mb-4"><div class="bg-blue-600 p-3 rounded-2xl text-white"><i data-lucide="car"></i></div>
                        <div class="flex gap-2"><button onclick="openCarModal(${c.id})" class="text-slate-300"><i data-lucide="edit-3" size="18"></i></button><button onclick="delCar(${c.id})" class="text-slate-200"><i data-lucide="trash-2" size="18"></i></button></div></div>
                        <h4 class="text-xl font-black text-slate-800">${c.marca} ${c.modelo}</h4>
                        <span class="text-[10px] text-slate-400 font-mono font-bold">${c.mat}</span>
                        <div class="mt-4 flex justify-between border-t pt-4"><div><p class="text-[9px] font-black text-slate-300">KM</p><p class="font-black text-blue-600">${c.km.toLocaleString()}</p></div>
                        <div class="text-right"><p class="text-[9px] font-black text-slate-300">INVESTIDO</p><p class="font-black text-slate-800">${c.maintenances.reduce((a,m)=>a+m.custo,0).toFixed(2)}€</p></div></div>
                        <button onclick="setView('details', ${c.id})" class="w-full mt-6 bg-slate-900 text-white py-4 rounded-[20px] font-black uppercase text-[10px] tracking-widest">Ver Mais</button>
                    </div>`).join('') + `</div>`;
            } else if (currentView === 'details') {
                const car = db.find(c => c.id === selectedCarId);
                title.innerText = car.mat;
                actions.innerHTML = `<button onclick="setView('garage')" class="text-slate-400 font-black text-[10px] uppercase">← Voltar</button>`;
                content.innerHTML = `<div class="flex gap-2 mb-8 mx-auto w-fit bg-white p-2 rounded-[24px] border shadow-sm">
                        <button onclick="activeTab='history';render()" class="px-8 py-3 rounded-[18px] font-black uppercase text-[10px] ${activeTab==='history'?'bg-blue-600 text-white':'text-slate-400'}">Serviços</button>
                        <button onclick="activeTab='tires';render()" class="px-8 py-3 rounded-[18px] font-black uppercase text-[10px] ${activeTab==='tires'?'bg-blue-600 text-white':'text-slate-400'}">Pneus</button>
                    </div>`;
                if(activeTab === 'history') {
                    content.innerHTML += `<button onclick="openMaintModal()" class="mb-6 w-full md:w-fit bg-slate-900 text-white px-8 py-4 rounded-2xl font-black uppercase text-[10px] mx-auto flex items-center justify-center gap-2"><i data-lucide="plus-circle" size="16"></i> Novo Serviço</button>
                        <div class="space-y-3 max-w-2xl mx-auto">${car.maintenances.sort((a,b)=>new Date(b.data)-new Date(a.data)).map(m => `
                            <div class="bg-white p-6 rounded-[28px] border flex justify-between items-center gap-4">
                                <div><p class="font-black text-slate-800 uppercase text-sm">${m.tipo} <span class="text-[8px] text-slate-400 ml-2">${m.data}</span></p>
                                <p class="text-[9px] text-blue-600 font-black italic">${m.km.toLocaleString()} KM</p>
                                ${m.file ? `<button onclick="viewFile('${m.file}')" class="mt-2 text-[8px] bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full font-black uppercase border border-emerald-100">Ver Fatura</button>` : ''}
                                </div><div class="font-black text-slate-900 text-xl italic">${m.custo.toFixed(2)}€</div>
                            </div>`).join('')}</div>`;
                } else {
                    content.innerHTML += `<button onclick="openTireModalBatch()" class="mb-8 w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-[10px] shadow-lg flex items-center justify-center gap-2"><i data-lucide="plus-circle" size="18"></i> Trocar Pneus</button>
                        <div class="grid grid-cols-2 gap-4 max-w-2xl mx-auto">
                            ${['FL','FR','RL','RR'].map(pos => {
                                const t = car.tires[pos] || {}; const l = {FL:'F. Esq.', FR:'F. Dir.', RL:'T. Esq.', RR:'T. Dir.'};
                                return `<div class="bg-white p-6 rounded-[32px] border-2 ${t.marca?'border-blue-100':'border-dashed border-slate-200'} text-center">
                                    <p class="text-[8px] font-black text-slate-400 uppercase mb-2">${l[pos]}</p>
                                    ${t.marca ? `<p class="font-black text-slate-800 text-sm">${t.marca}</p><p class="text-[8px] font-bold text-blue-600 mt-2">${(car.km - t.km).toLocaleString()} km rodados</p>` : '<i data-lucide="circle-slash" size="24" class="mx-auto opacity-10 my-4"></i>'}
                                </div>`; }).join('')}</div>`;
                }
            } else if (currentView === 'stats') {
                const totalGlobal = db.reduce((acc, c) => acc + c.maintenances.reduce((a, m) => a + m.custo, 0), 0);
                content.innerHTML = `<div class="max-w-2xl mx-auto"><div class="bg-slate-900 text-white p-12 rounded-[48px] shadow-xl text-center mb-10"><p class="text-slate-500 font-black uppercase text-[9px] tracking-widest mb-4">Total Investido</p><h2 class="text-5xl font-black italic text-blue-500">${totalGlobal.toFixed(2)}€</h2></div>
                    <div class="grid gap-2">${db.map(c => `<div class="bg-white p-5 rounded-[24px] border flex justify-between items-center"><div><p class="font-black text-slate-800 uppercase text-xs">${c.marca} ${c.modelo}</p><p class="text-[9px] font-bold text-slate-400 font-mono">${c.mat}</p></div><div class="text-xl font-black text-blue-600">${c.maintenances.reduce((acc, m) => acc + m.custo, 0).toFixed(2)}€</div></div>`).join('')}</div></div>`;
            }
            lucide.createIcons();
        }

        checkAuth();
        render();
    </script>
</body>
</html>
